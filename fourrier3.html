<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Transformée de Fourier</title>
  <style>
    :root {
      --bg-1: #06101d;
      --bg-2: #0b1728;
      --panel: rgba(12, 22, 38, 0.88);
      --panel-2: rgba(17, 30, 50, 0.96);
      --line: rgba(151, 185, 255, 0.18);
      --text: #f3f7ff;
      --muted: #a6b8da;
      --accent-1: #7ad7ff;
      --accent-2: #7ff2c3;
      --accent-3: #ffc67c;
      --sum: #ffffff;
      --active: #8fb2ff;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.28);
      --radius: 18px;
      --gap: clamp(6px, 1vw, 10px);
      --font-xs: clamp(9px, 1.55vw, 11px);
      --font-sm: clamp(10px, 1.8vw, 12px);
      --font-md: clamp(11px, 2vw, 13px);
      --font-lg: clamp(12px, 2.3vw, 15px);
      --toolbar-h: clamp(124px, 24vh, 166px);
      --control-h: clamp(18px, 3.2vh, 24px);
      --button-h: clamp(26px, 4.4vh, 32px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(122, 215, 255, 0.12), transparent 28%),
        radial-gradient(circle at 85% 10%, rgba(143, 178, 255, 0.10), transparent 24%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      color: var(--text);
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .app {
      width: 100vw;
      height: 100svh;
      padding: clamp(6px, 1vw, 10px);
      display: grid;
      grid-template-rows: minmax(0, var(--toolbar-h)) minmax(0, 1fr);
      gap: var(--gap);
      overflow: hidden;
    }

    .toolbar {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr)) minmax(170px, 0.9fr);
      gap: var(--gap);
    }

    .panel {
      background: linear-gradient(180deg, rgba(19, 31, 53, 0.96), rgba(12, 21, 37, 0.96));
      border: 1px solid rgba(151, 185, 255, 0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    .control-card {
      padding: 8px 10px;
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 5px;
      min-height: 0;
    }

    .row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-width: 0;
    }

    .chip-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: var(--font-lg);
      font-weight: 800;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .mini-toggle {
      appearance: none;
      border: none;
      border-radius: 999px;
      min-height: var(--button-h);
      padding: 0 10px;
      font-size: var(--font-xs);
      font-weight: 800;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .mini-toggle.on {
      background: linear-gradient(180deg, rgba(143,178,255,.34), rgba(143,178,255,.16));
      border: 1px solid rgba(143,178,255,.2);
    }

    .slider-block {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 6px;
      min-height: 0;
    }

    .slider-tag {
      font-size: var(--font-xs);
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }

    .value-badge {
      min-width: 46px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: var(--font-xs);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      height: var(--control-h);
      accent-color: var(--active);
      cursor: pointer;
    }

    .mode-card {
      padding: 8px 10px;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 8px;
      min-height: 0;
    }

    .section-label {
      font-size: var(--font-xs);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      font-weight: 800;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .mode-btn,
    .action-btn {
      min-height: var(--button-h);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: var(--font-sm);
      font-weight: 800;
      cursor: pointer;
      padding: 0 10px;
    }

    .mode-btn.active,
    .action-btn.primary {
      background: linear-gradient(180deg, rgba(143,178,255,.34), rgba(143,178,255,.14));
      border-color: rgba(143,178,255,.18);
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .hint {
      font-size: var(--font-xs);
      color: var(--muted);
      line-height: 1.18;
      align-self: end;
    }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: var(--gap);
      overflow: hidden;
    }

    .plot-panel {
      position: relative;
      min-width: 0;
      min-height: 0;
      padding: 6px;
      display: flex;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(7, 15, 26, 0.94), rgba(10, 18, 30, 0.98));
    }

    .plot-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 2;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(6, 12, 22, 0.70);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      font-size: var(--font-sm);
      color: var(--text);
      font-weight: 800;
      letter-spacing: .01em;
    }

    .plot-note {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 2;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(6, 12, 22, 0.64);
      font-size: var(--font-xs);
      color: rgba(243,247,255,.78);
      backdrop-filter: blur(8px);
    }

    @media (max-width: 980px) {
      .toolbar {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
    }

    @media (max-width: 620px) {
      :root {
        --toolbar-h: clamp(176px, 34vh, 230px);
      }
      .app {
        padding: 6px;
      }
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }
      .mode-grid {
        grid-template-columns: 1fr;
      }
      .action-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-height: 760px) {
      :root {
        --toolbar-h: clamp(108px, 22vh, 136px);
        --radius: 16px;
      }
      .control-card,
      .mode-card {
        padding: 7px 9px;
        gap: 4px;
      }
      .hint {
        display: none;
      }
      .plot-badge {
        top: 10px;
        left: 10px;
        padding: 4px 8px;
      }
      .plot-note {
        right: 10px;
        bottom: 10px;
      }
    }

    @media (max-height: 560px) {
      :root {
        --toolbar-h: clamp(94px, 19vh, 116px);
        --font-xs: 8px;
        --font-sm: 9px;
        --font-md: 10px;
        --font-lg: 11px;
        --button-h: 24px;
        --control-h: 16px;
      }
      .control-card,
      .mode-card {
        padding: 6px 8px;
      }
      .slider-block {
        gap: 4px;
        grid-template-columns: 18px 1fr 40px;
      }
      .dot {
        width: 8px;
        height: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="toolbar">
      <div class="panel control-card">
        <div class="row-top">
          <span class="chip-label"><span class="dot" style="background: var(--accent-1)"></span>f₁</span>
          <button id="toggle1" class="mini-toggle on">Visible</button>
        </div>
        <div class="slider-block">
          <span class="slider-tag">A</span>
          <input id="a1" type="range" min="0" max="2" step="0.01" value="1.00" />
          <span class="value-badge" id="a1Val">1.00</span>
        </div>
        <div class="slider-block">
          <span class="slider-tag">f</span>
          <input id="f1" type="range" min="0.5" max="8" step="0.1" value="1.0" />
          <span class="value-badge" id="f1Val">1.0 Hz</span>
        </div>
      </div>

      <div class="panel control-card">
        <div class="row-top">
          <span class="chip-label"><span class="dot" style="background: var(--accent-2)"></span>f₂</span>
          <button id="toggle2" class="mini-toggle on">Visible</button>
        </div>
        <div class="slider-block">
          <span class="slider-tag">A</span>
          <input id="a2" type="range" min="0" max="2" step="0.01" value="0.70" />
          <span class="value-badge" id="a2Val">0.70</span>
        </div>
        <div class="slider-block">
          <span class="slider-tag">f</span>
          <input id="f2" type="range" min="0.5" max="8" step="0.1" value="3.0" />
          <span class="value-badge" id="f2Val">3.0 Hz</span>
        </div>
      </div>

      <div class="panel control-card">
        <div class="row-top">
          <span class="chip-label"><span class="dot" style="background: var(--accent-3)"></span>f₃</span>
          <button id="toggle3" class="mini-toggle on">Visible</button>
        </div>
        <div class="slider-block">
          <span class="slider-tag">A</span>
          <input id="a3" type="range" min="0" max="2" step="0.01" value="0.45" />
          <span class="value-badge" id="a3Val">0.45</span>
        </div>
        <div class="slider-block">
          <span class="slider-tag">f</span>
          <input id="f3" type="range" min="0.5" max="8" step="0.1" value="5.0" />
          <span class="value-badge" id="f3Val">5.0 Hz</span>
        </div>
      </div>

      <div class="panel mode-card">
        <div class="section-label">Affichage</div>
        <div class="mode-grid">
          <button id="modeCombined" class="mode-btn">Somme seule</button>
          <button id="modeComponents" class="mode-btn">Fréquences</button>
          <button id="modeBoth" class="mode-btn active">Les deux</button>
        </div>
        <div class="action-grid">
          <button id="playPause" class="action-btn primary">Pause</button>
          <button id="resetBtn" class="action-btn">Reset</button>
        </div>
        <div class="hint">Tu peux régler l’amplitude A et la fréquence f de chaque composante, puis choisir d’afficher seulement la somme, seulement les fréquences, ou les deux.</div>
      </div>
    </section>

    <section class="main">
      <article class="panel plot-panel">
        <div class="plot-badge">Signal temporel</div>
        <canvas id="signalCanvas"></canvas>
        <div class="plot-note">Temps</div>
      </article>

      <article class="panel plot-panel">
        <div class="plot-badge">Spectre fréquentiel</div>
        <canvas id="spectrumCanvas"></canvas>
        <div class="plot-note">Fréquence</div>
      </article>
    </section>
  </div>

  <script>
    const signalCanvas = document.getElementById('signalCanvas');
    const spectrumCanvas = document.getElementById('spectrumCanvas');
    const sctx = signalCanvas.getContext('2d');
    const fctx = spectrumCanvas.getContext('2d');

    const controls = {
      a1: document.getElementById('a1'),
      a2: document.getElementById('a2'),
      a3: document.getElementById('a3'),
      f1: document.getElementById('f1'),
      f2: document.getElementById('f2'),
      f3: document.getElementById('f3'),
      a1Val: document.getElementById('a1Val'),
      a2Val: document.getElementById('a2Val'),
      a3Val: document.getElementById('a3Val'),
      f1Val: document.getElementById('f1Val'),
      f2Val: document.getElementById('f2Val'),
      f3Val: document.getElementById('f3Val'),
      toggle1: document.getElementById('toggle1'),
      toggle2: document.getElementById('toggle2'),
      toggle3: document.getElementById('toggle3'),
      playPause: document.getElementById('playPause'),
      resetBtn: document.getElementById('resetBtn'),
      modeCombined: document.getElementById('modeCombined'),
      modeComponents: document.getElementById('modeComponents'),
      modeBoth: document.getElementById('modeBoth')
    };

    const colors = ['#7ad7ff', '#7ff2c3', '#ffc67c'];
    let visible = [true, true, true];
    let displayMode = 'both';
    let playing = true;
    let phaseTime = 0;
    let lastTs = performance.now();
    const maxFreqDisplay = 8;

    function resizeCanvas(canvas) {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(10, Math.floor(rect.width * dpr));
      canvas.height = Math.max(10, Math.floor(rect.height * dpr));
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { w: rect.width, h: rect.height };
    }

    function getState() {
      return {
        amps: [
          parseFloat(controls.a1.value),
          parseFloat(controls.a2.value),
          parseFloat(controls.a3.value)
        ],
        freqs: [
          parseFloat(controls.f1.value),
          parseFloat(controls.f2.value),
          parseFloat(controls.f3.value)
        ],
        visible: [...visible]
      };
    }

    function updateReadouts() {
      controls.a1Val.textContent = parseFloat(controls.a1.value).toFixed(2);
      controls.a2Val.textContent = parseFloat(controls.a2.value).toFixed(2);
      controls.a3Val.textContent = parseFloat(controls.a3.value).toFixed(2);
      controls.f1Val.textContent = parseFloat(controls.f1.value).toFixed(1) + ' Hz';
      controls.f2Val.textContent = parseFloat(controls.f2.value).toFixed(1) + ' Hz';
      controls.f3Val.textContent = parseFloat(controls.f3.value).toFixed(1) + ' Hz';
    }

    function syncToggleButtons() {
      [controls.toggle1, controls.toggle2, controls.toggle3].forEach((btn, i) => {
        btn.classList.toggle('on', visible[i]);
        btn.textContent = visible[i] ? 'Visible' : 'Masquée';
      });
    }

    function setMode(mode) {
      displayMode = mode;
      controls.modeCombined.classList.toggle('active', mode === 'combined');
      controls.modeComponents.classList.toggle('active', mode === 'components');
      controls.modeBoth.classList.toggle('active', mode === 'both');
      render();
    }

    function drawAxes(ctx, w, h, left, right, top, bottom, xMarks, yMarks) {
      ctx.save();
      ctx.strokeStyle = 'rgba(151,185,255,.16)';
      ctx.lineWidth = 1;
      ctx.font = `${Math.max(8, Math.min(11, w * 0.018))}px Inter, Arial, sans-serif`;
      ctx.fillStyle = 'rgba(243,247,255,.68)';

      for (const y of yMarks) {
        const py = top + (1 - y.n) * (h - top - bottom);
        ctx.beginPath();
        ctx.moveTo(left, py);
        ctx.lineTo(w - right, py);
        ctx.stroke();
        ctx.fillText(y.label, 4, py + 3);
      }

      for (const x of xMarks) {
        const px = left + x.n * (w - left - right);
        ctx.beginPath();
        ctx.moveTo(px, top);
        ctx.lineTo(px, h - bottom);
        ctx.stroke();
        ctx.fillText(x.label, px - 6, h - 6);
      }

      ctx.strokeStyle = 'rgba(255,255,255,.28)';
      ctx.beginPath();
      ctx.moveTo(left, top);
      ctx.lineTo(left, h - bottom);
      ctx.lineTo(w - right, h - bottom);
      ctx.stroke();
      ctx.restore();
    }

    function drawSignal() {
      const { w, h } = resizeCanvas(signalCanvas);
      const { amps, freqs, visible } = getState();
      sctx.clearRect(0, 0, w, h);

      const left = 34;
      const right = 12;
      const top = 18;
      const bottom = 22;
      const usableW = w - left - right;
      const usableH = h - top - bottom;
      const centerY = top + usableH / 2;
      const scaleY = usableH * 0.18;
      const samples = Math.max(180, Math.floor(usableW));
      const showComponents = displayMode === 'components' || displayMode === 'both';
      const showCombined = displayMode === 'combined' || displayMode === 'both';

      drawAxes(
        sctx, w, h, left, right, top, bottom,
        [
          { n: 0, label: '0' },
          { n: 0.5, label: 'π' },
          { n: 1, label: '2π' }
        ],
        [
          { n: 1, label: '+2' },
          { n: 0.5, label: '0' },
          { n: 0, label: '-2' }
        ]
      );

      if (showComponents) {
        for (let i = 0; i < 3; i++) {
          if (!visible[i]) continue;
          sctx.beginPath();
          for (let k = 0; k <= samples; k++) {
            const xNorm = k / samples;
            const t = xNorm * Math.PI * 2;
            const yVal = amps[i] * Math.sin(freqs[i] * t - phaseTime * freqs[i] * 0.7);
            const x = left + xNorm * usableW;
            const y = centerY - yVal * scaleY;
            if (k === 0) sctx.moveTo(x, y);
            else sctx.lineTo(x, y);
          }
          sctx.strokeStyle = colors[i];
          sctx.lineWidth = Math.max(1.1, Math.min(2, w * 0.0032));
          sctx.stroke();
        }
      }

      if (showCombined) {
        sctx.beginPath();
        for (let k = 0; k <= samples; k++) {
          const xNorm = k / samples;
          const t = xNorm * Math.PI * 2;
          let ySum = 0;
          for (let i = 0; i < 3; i++) {
            if (!visible[i]) continue;
            ySum += amps[i] * Math.sin(freqs[i] * t - phaseTime * freqs[i] * 0.7);
          }
          const x = left + xNorm * usableW;
          const y = centerY - ySum * scaleY * 0.48;
          if (k === 0) sctx.moveTo(x, y);
          else sctx.lineTo(x, y);
        }
        sctx.strokeStyle = '#ffffff';
        sctx.lineWidth = Math.max(1.6, Math.min(2.8, w * 0.0044));
        sctx.shadowColor = 'rgba(255,255,255,.16)';
        sctx.shadowBlur = 8;
        sctx.stroke();
        sctx.shadowBlur = 0;

        const cursorNorm = ((phaseTime * 0.11) % 1 + 1) % 1;
        const cursorX = left + cursorNorm * usableW;
        sctx.setLineDash([4, 4]);
        sctx.strokeStyle = 'rgba(255,255,255,.22)';
        sctx.beginPath();
        sctx.moveTo(cursorX, top);
        sctx.lineTo(cursorX, h - bottom);
        sctx.stroke();
        sctx.setLineDash([]);
      }
    }

    function drawSpectrum() {
      const { w, h } = resizeCanvas(spectrumCanvas);
      const { amps, freqs, visible } = getState();
      fctx.clearRect(0, 0, w, h);

      const left = 36;
      const right = 14;
      const top = 18;
      const bottom = 24;
      const usableW = w - left - right;
      const usableH = h - top - bottom;
      const maxAmp = 2;

      drawAxes(
        fctx, w, h, left, right, top, bottom,
        [0, 2, 4, 6, 8].map(v => ({ n: v / maxFreqDisplay, label: String(v) })),
        [
          { n: 1, label: '2' },
          { n: 0.5, label: '1' },
          { n: 0, label: '0' }
        ]
      );

      const barW = Math.min(usableW * 0.11, 34);
      const pulse = 0.93 + 0.07 * Math.sin(phaseTime * 3.1);

      for (let i = 0; i < 3; i++) {
        if (!visible[i]) continue;
        const n = Math.min(1, Math.max(0, freqs[i] / maxFreqDisplay));
        const x = left + n * usableW - barW / 2;
        const amp = amps[i];
        const barH = (amp / maxAmp) * usableH * pulse;
        const y = top + usableH - barH;

        fctx.fillStyle = 'rgba(255,255,255,.04)';
        fctx.fillRect(x, top, barW, usableH);

        const grad = fctx.createLinearGradient(0, y, 0, top + usableH);
        grad.addColorStop(0, colors[i]);
        grad.addColorStop(1, 'rgba(255,255,255,.08)');
        fctx.fillStyle = grad;
        fctx.fillRect(x, y, barW, barH);

        fctx.strokeStyle = colors[i];
        fctx.lineWidth = 1.4;
        fctx.strokeRect(x, y, barW, barH);

        fctx.fillStyle = 'rgba(243,247,255,.88)';
        fctx.font = `${Math.max(8, Math.min(11, w * 0.018))}px Inter, Arial, sans-serif`;
        fctx.textAlign = 'center';
        fctx.fillText(amp.toFixed(2), x + barW / 2, Math.max(12, y - 5));
      }

      fctx.textAlign = 'left';
    }

    function render() {
      drawSignal();
      drawSpectrum();
    }

    function animate(ts) {
      const dt = Math.min(0.05, (ts - lastTs) / 1000);
      lastTs = ts;
      if (playing) phaseTime += dt;
      render();
      requestAnimationFrame(animate);
    }

    function resetDefaults() {
      controls.a1.value = '1.00';
      controls.a2.value = '0.70';
      controls.a3.value = '0.45';
      controls.f1.value = '1.0';
      controls.f2.value = '3.0';
      controls.f3.value = '5.0';
      visible = [true, true, true];
      syncToggleButtons();
      setMode('both');
      phaseTime = 0;
      updateReadouts();
      render();
    }

    [controls.a1, controls.a2, controls.a3, controls.f1, controls.f2, controls.f3].forEach(el => {
      el.addEventListener('input', () => {
        updateReadouts();
        render();
      });
    });

    controls.toggle1.addEventListener('click', () => { visible[0] = !visible[0]; syncToggleButtons(); render(); });
    controls.toggle2.addEventListener('click', () => { visible[1] = !visible[1]; syncToggleButtons(); render(); });
    controls.toggle3.addEventListener('click', () => { visible[2] = !visible[2]; syncToggleButtons(); render(); });

    controls.modeCombined.addEventListener('click', () => setMode('combined'));
    controls.modeComponents.addEventListener('click', () => setMode('components'));
    controls.modeBoth.addEventListener('click', () => setMode('both'));

    controls.playPause.addEventListener('click', () => {
      playing = !playing;
      controls.playPause.textContent = playing ? 'Pause' : 'Lecture';
      controls.playPause.classList.toggle('primary', playing);
    });

    controls.resetBtn.addEventListener('click', resetDefaults);
    window.addEventListener('resize', render, { passive: true });

    updateReadouts();
    syncToggleButtons();
    render();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
